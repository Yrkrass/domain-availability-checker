services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    volumes:
      - ../src:/var/www/html
    networks:
      - internal

  web:
    image: nginx:alpine
    ports:
      - "127.0.5.10:80:80"
    volumes:
      - ../src:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - internal

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    ports:
      - "127.0.5.11:80:80"
    environment:
      PMA_HOST: db
    depends_on:
      - db
    networks:
      - internal

  redis:
    image: redis:alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    networks:
      - internal

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: php artisan queue:work
    restart: unless-stopped
    volumes:
      - ../src:/var/www/html
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - internal

  scheduler:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: php artisan schedule:work
    volumes:
      - ../src:/var/www/html
    depends_on:
      - redis
    networks:
      - internal

volumes:
  db_data:
  pgadmin_data:

networks:
  internal: